version: '3.9'

services:
  mcp-server:
    image: python:3.11-slim
    container_name: mcp-server
    working_dir: /app
    env_file:
      - .env
    volumes:
      - ./mcp-server:/app
    ports:
      - "8000:8000"
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
             uvicorn main:app --host 0.0.0.0 --port 8000 --reload"

  agent:
    image: python:3.11-slim
    container_name: agent
    working_dir: /app
    env_file:
      - .env
    volumes:
      - ./agent:/app
    ports:
      - "8001:8001"
    depends_on:
      - mcp-server
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
             uvicorn main:app --host 0.0.0.0 --port 8001 --reload"

  frontend:
    image: node:18
    container_name: frontend
    working_dir: /app
    env_file:
      - .env
    volumes:
      - ./frontend:/app
    ports:
      - "3000:3000"
    depends_on:
      - agent
    command: >
      sh -c "npm install && npm start"
